<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LORDSHOP — Top Up Diamond Mobile Legends</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root{
    --bg-void:#0A0E1A;
    --bg-panel:#121729;
    --bg-panel-2:#171D33;
    --line:#262E48;
    --gold:#E3B341;
    --gold-dim:#8A6E2E;
    --cyan:#4FD9E8;
    --text:#E9EDF6;
    --text-dim:#8891A8;
    --danger:#FF5D6C;
    --ok:#5FE0A0;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--bg-void); color:var(--text); font-family:'Plus Jakarta Sans', sans-serif;
    overflow-x:hidden; padding-bottom:78px;
    background-image:
      radial-gradient(circle at 15% 8%, rgba(79,217,232,0.08), transparent 40%),
      radial-gradient(circle at 85% 0%, rgba(227,179,65,0.08), transparent 45%);
  }
  h1,h2,h3, .display{ font-family:'Rajdhani', sans-serif; text-transform:uppercase; letter-spacing:0.03em; }
  a{color:inherit; text-decoration:none;}
  ::selection{background:var(--gold); color:#0A0E1A;}
  :focus-visible{outline:2px solid var(--cyan); outline-offset:3px;}
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important;}
  }
  .wrap{max-width:1180px; margin:0 auto; padding:0 24px;}

  /* view switching: only one visible at a time, same file */
  .view{display:none;}
  .view.active{display:block;}

  /* ---------- NAV ---------- */
  nav.top-nav{ position:sticky; top:0; z-index:50; background:rgba(10,14,26,0.85); backdrop-filter:blur(10px); border-bottom:1px solid var(--line); }
  nav .wrap{display:flex; align-items:center; justify-content:space-between; height:72px;}
  .logo{display:flex; align-items:center; gap:10px; font-family:'Rajdhani'; font-weight:700; font-size:22px; letter-spacing:0.04em;}
  .logo .gem{width:16px; height:16px; background:linear-gradient(135deg, var(--cyan), var(--gold)); clip-path:polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%); flex-shrink:0;}
  .nav-links{display:flex; gap:32px; font-size:14px; color:var(--text-dim); font-weight:500;}
  .nav-links a:hover{color:var(--gold);}
  .nav-cta{ background:var(--gold); color:#0A0E1A; font-weight:700; font-size:14px; padding:10px 20px; border-radius:3px; letter-spacing:0.02em; cursor:pointer; border:none; font-family:inherit;}
  .nav-mobile-hide{display:flex;}
  @media (max-width:760px){ .nav-mobile-hide{display:none;} }
  .nav-right{display:flex; align-items:center; gap:12px;}

  /* ---------- AUTH: nav chip + dropdown ---------- */
  .btn-login{
    background:none; border:1px solid var(--line); color:var(--text); font-weight:600; font-size:13.5px;
    padding:9px 16px; border-radius:3px; cursor:pointer; font-family:inherit;
  }
  .btn-login:hover{border-color:var(--cyan); color:var(--cyan);}
  .user-chip{position:relative; display:flex; align-items:center; gap:9px; cursor:pointer; padding:6px 10px 6px 6px; border-radius:999px; border:1px solid var(--line);}
  .user-chip:hover{border-color:var(--gold-dim);}
  .user-avatar{
    width:28px; height:28px; border-radius:50%; background:linear-gradient(135deg, var(--cyan), var(--gold));
    display:flex; align-items:center; justify-content:center; font-family:'Rajdhani'; font-weight:700; font-size:12px; color:#0A0E1A;
    overflow:hidden; flex-shrink:0;
  }
  .user-avatar img{width:100%; height:100%; object-fit:cover;}
  .user-chip .user-name{font-size:13.5px; font-weight:600; max-width:110px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .user-menu{
    position:absolute; top:calc(100% + 8px); right:0; background:var(--bg-panel); border:1px solid var(--line);
    border-radius:8px; min-width:180px; padding:6px; display:none; flex-direction:column; gap:2px;
    box-shadow:0 20px 40px -16px rgba(0,0,0,0.6); z-index:60;
  }
  .user-menu.open{display:flex;}
  .user-menu button{
    background:none; border:none; text-align:left; padding:10px 12px; border-radius:5px; font-size:13.5px;
    color:var(--text); cursor:pointer; font-family:inherit;
  }
  .user-menu button:hover{background:var(--bg-panel-2); color:var(--gold);}
  .user-menu .badge-role{font-size:11px; color:var(--text-dim); padding:6px 12px 2px; text-transform:uppercase; letter-spacing:0.05em;}

  /* ---------- LOGIN MODAL ---------- */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(6,9,17,0.75); backdrop-filter:blur(3px);
    display:none; align-items:center; justify-content:center; z-index:90; padding:20px;
  }
  .modal-overlay.open{display:flex;}
  .modal-card{
    width:100%; max-width:360px; background:var(--bg-panel); border:1px solid var(--line); border-radius:10px;
    padding:28px 26px; position:relative;
  }
  .modal-close{
    position:absolute; top:14px; right:14px; background:none; border:none; color:var(--text-dim);
    font-size:20px; cursor:pointer; line-height:1;
  }
  .modal-close:hover{color:var(--text);}
  .modal-card h2{font-size:22px;}
  .modal-card > p{font-size:13.5px; color:var(--text-dim); margin-top:8px; margin-bottom:22px;}
  .google-btn-slot{display:flex; justify-content:center; min-height:44px;}
  .divider{display:flex; align-items:center; gap:12px; margin:20px 0; font-size:12px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.06em;}
  .divider::before, .divider::after{content:''; flex:1; height:1px; background:var(--line);}
  .btn-guest{
    width:100%; background:var(--bg-panel-2); border:1px solid var(--line); color:var(--text); font-weight:600;
    padding:13px; border-radius:5px; cursor:pointer; font-size:14px; font-family:inherit;
  }
  .btn-guest:hover{border-color:var(--gold-dim); color:var(--gold);}

  /* ---------- ORDERS VIEW ---------- */
  .orders-wrap{min-height:100vh; padding:40px 16px;}
  .orders-inner{max-width:640px; margin:0 auto;}
  .orders-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:24px;}
  .orders-head h2{font-size:24px;}
  .order-item{
    background:var(--bg-panel); border:1px solid var(--line); border-radius:8px; padding:18px 20px; margin-bottom:12px;
    display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap;
  }
  .order-item .oi-left{display:flex; align-items:center; gap:14px;}
  .order-item .gem-icon{width:32px; height:32px; margin:0; clip-path:polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%); background:linear-gradient(150deg, var(--cyan), var(--gold)); flex-shrink:0;}
  .order-item .oi-title{font-family:'Rajdhani'; font-weight:700; font-size:16.5px;}
  .order-item .oi-sub{font-size:12.5px; color:var(--text-dim); margin-top:2px;}
  .status-badge{
    font-size:11.5px; font-weight:700; letter-spacing:0.04em; text-transform:uppercase; padding:6px 12px; border-radius:999px;
  }
  .status-badge.pending{background:rgba(227,179,65,0.12); color:var(--gold); border:1px solid var(--gold-dim);}
  .status-badge.success{background:rgba(95,224,160,0.12); color:var(--ok); border:1px solid rgba(95,224,160,0.4);}
  .status-badge.failed{background:rgba(255,93,108,0.12); color:var(--danger); border:1px solid rgba(255,93,108,0.4);}
  .orders-empty{ text-align:center; padding:60px 20px; color:var(--text-dim); }
  .orders-empty p{margin-top:10px; font-size:14px;}
  .demo-note{margin-top:20px; font-size:12px; color:var(--text-dim); text-align:center; line-height:1.6;}

  /* ---------- BOTTOM NAV BAR ---------- */
  .bottom-nav{
    position:fixed; left:0; right:0; bottom:0; z-index:80;
    background:rgba(10,14,26,0.95); backdrop-filter:blur(10px); border-top:1px solid var(--line);
    display:flex; justify-content:space-around; align-items:center;
    padding:8px 10px calc(8px + env(safe-area-inset-bottom));
  }
  .bn-item{
    background:none; border:none; display:flex; flex-direction:column; align-items:center; gap:4px;
    color:var(--text-dim); font-size:11px; font-weight:600; cursor:pointer; font-family:inherit;
    padding:6px 18px; border-radius:8px; transition:color .15s ease;
  }
  .bn-item svg{width:21px; height:21px; stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round;}
  .bn-item.active{color:var(--gold);}
  .bn-item:hover{color:var(--text);}

  /* ---------- ACCOUNT MODAL ---------- */
  .acc-head{display:flex; flex-direction:column; align-items:center; gap:10px; margin-bottom:18px;}
  .acc-avatar-lg{width:56px; height:56px; border-radius:50%; overflow:hidden;}
  .acc-avatar-lg img{width:100%; height:100%; object-fit:cover;}
  .acc-name{font-family:'Rajdhani'; font-weight:700; font-size:18px;}
  .acc-type{font-size:11.5px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.06em;}

  /* ---------- HERO ---------- */
  .hero{position:relative; padding:88px 0 70px; overflow:hidden;}
  .hero-grid{
    position:absolute; inset:0; opacity:0.35;
    background-image:linear-gradient(var(--line) 1px, transparent 1px), linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size:64px 64px;
    mask-image:radial-gradient(ellipse 70% 60% at 50% 20%, black, transparent);
  }
  .hero-inner{position:relative; display:grid; grid-template-columns:1.1fr 0.9fr; gap:40px; align-items:center;}
  @media (max-width:860px){ .hero-inner{grid-template-columns:1fr;} }
  .eyebrow{
    display:inline-flex; align-items:center; gap:8px; font-size:12.5px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase;
    color:var(--cyan); border:1px solid rgba(79,217,232,0.35); background:rgba(79,217,232,0.06);
    padding:6px 14px; border-radius:999px; margin-bottom:22px;
  }
  .eyebrow .dot{width:6px; height:6px; border-radius:50%; background:var(--cyan); box-shadow:0 0 8px var(--cyan);}
  .hero h1{font-size:clamp(38px, 5.4vw, 64px); line-height:1.02; font-weight:700;}
  .hero h1 .accent{color:var(--gold);}
  .hero p{margin-top:20px; font-size:16.5px; color:var(--text-dim); max-width:480px; line-height:1.65;}
  .hero-actions{margin-top:32px; display:flex; gap:14px; flex-wrap:wrap;}
  .btn-primary{
    background:var(--gold); color:#0A0E1A; font-weight:700; padding:15px 28px; border-radius:3px; font-size:15px; letter-spacing:0.01em; border:none; cursor:pointer;
    box-shadow:0 0 0 1px rgba(227,179,65,0.4), 0 12px 30px -10px rgba(227,179,65,0.5); transition:transform .15s ease; font-family:inherit;
  }
  .btn-primary:hover{transform:translateY(-2px);}
  .btn-ghost{
    padding:15px 26px; border:1px solid var(--line); border-radius:3px; font-weight:600; font-size:15px; color:var(--text);
    transition:border-color .15s ease; background:none; cursor:pointer; font-family:inherit;
  }
  .btn-ghost:hover{border-color:var(--cyan); color:var(--cyan);}
  .hero-stats{display:flex; gap:32px; margin-top:44px; flex-wrap:wrap;}
  .hero-stats div b{display:block; font-family:'Rajdhani'; font-size:26px; font-weight:700; color:var(--text);}
  .hero-stats div span{font-size:12.5px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.08em;}

  .hero-visual{position:relative; height:380px; display:flex; align-items:center; justify-content:center;}
  .facet{ position:absolute; clip-path:polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%); background:linear-gradient(160deg, rgba(79,217,232,0.9), rgba(227,179,65,0.85)); }
  .facet.f1{width:220px; height:220px; opacity:0.9; animation:float 6s ease-in-out infinite;}
  .facet.f2{width:220px; height:220px; opacity:0.18; transform:scale(1.5) rotate(8deg); filter:blur(2px);}
  .facet.f3{width:220px; height:220px; opacity:0.10; transform:scale(2.1) rotate(-6deg); filter:blur(6px);}
  @keyframes float{0%,100%{transform:translateY(0);} 50%{transform:translateY(-14px);}}
  .hero-visual .core{ position:absolute; font-family:'Rajdhani'; font-weight:700; text-align:center; color:#0A0E1A; z-index:2; }
  .hero-visual .core b{display:block; font-size:34px;}
  .hero-visual .core span{font-size:12px; letter-spacing:0.1em;}

  /* ---------- SECTION HEADS ---------- */
  .section{padding:64px 0;}
  .section-head{margin-bottom:36px; display:flex; align-items:flex-end; justify-content:space-between; gap:20px; flex-wrap:wrap;}
  .section-head h2{font-size:clamp(26px,3.2vw,36px); font-weight:700;}
  .section-head p{color:var(--text-dim); font-size:14.5px; max-width:420px;}

  /* ---------- STEPS ---------- */
  .steps{display:grid; grid-template-columns:repeat(3,1fr); gap:20px;}
  @media (max-width:760px){ .steps{grid-template-columns:1fr;} }
  .step{ background:var(--bg-panel); border:1px solid var(--line); border-radius:6px; padding:26px; position:relative; }
  .step .num{font-family:'Rajdhani'; font-weight:700; font-size:15px; color:var(--gold); letter-spacing:0.08em;}
  .step h3{font-size:19px; margin-top:10px; font-weight:600; text-transform:none;}
  .step p{font-size:14px; color:var(--text-dim); margin-top:8px; line-height:1.55;}

  /* ---------- ID FORM ---------- */
  .id-form{
    background:var(--bg-panel); border:1px solid var(--line); border-radius:8px; padding:26px 28px;
    display:grid; grid-template-columns:1fr 1fr auto; gap:14px; align-items:end;
  }
  @media (max-width:700px){ .id-form{grid-template-columns:1fr;} }
  .field label{display:block; font-size:12.5px; color:var(--text-dim); margin-bottom:7px; text-transform:uppercase; letter-spacing:0.06em; font-weight:600;}
  .field input{
    width:100%; background:var(--bg-panel-2); border:1px solid var(--line); border-radius:4px;
    padding:13px 14px; color:var(--text); font-size:14.5px; font-family:inherit;
  }
  .field input:focus{border-color:var(--cyan);}
  #idStatus{margin-top:14px; font-size:13.5px; color:var(--text-dim);}
  #idStatus.ok{color:var(--ok);}
  #idStatus.err{color:var(--danger);}

  /* ---------- PACKAGES ---------- */
  .pkg-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-top:36px;}
  @media (max-width:900px){ .pkg-grid{grid-template-columns:repeat(2,1fr);} }
  @media (max-width:520px){ .pkg-grid{grid-template-columns:1fr;} }
  .pkg{
    background:var(--bg-panel); border:1px solid var(--line); border-radius:6px; padding:22px 18px 20px; cursor:pointer;
    position:relative; transition:border-color .15s ease, transform .15s ease, background .15s ease; text-align:center;
  }
  .pkg:hover{transform:translateY(-3px); border-color:var(--gold-dim);}
  .pkg.selected{border-color:var(--gold); background:var(--bg-panel-2); box-shadow:0 0 0 1px var(--gold), 0 14px 30px -14px rgba(227,179,65,0.5);}
  .pkg .badge{
    position:absolute; top:-10px; left:50%; transform:translateX(-50%); background:var(--danger); color:#fff;
    font-size:10.5px; font-weight:700; letter-spacing:0.05em; padding:4px 10px; border-radius:999px; text-transform:uppercase;
  }
  .pkg .gem-icon{ width:38px; height:38px; margin:6px auto 14px; clip-path:polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%); background:linear-gradient(150deg, var(--cyan), var(--gold)); }
  .pkg .amt{font-family:'Rajdhani'; font-weight:700; font-size:21px;}
  .pkg .amt small{font-size:12px; color:var(--text-dim); font-weight:600; display:block; margin-top:2px; text-transform:none;}
  .pkg .price{margin-top:12px; font-size:15.5px; font-weight:700; color:var(--gold);}

  /* ---------- ORDER SUMMARY (fixed to bottom, above bottom nav) ---------- */
  .order-bar{
    position:fixed; left:0; right:0; bottom:84px; z-index:70;
    width:calc(100% - 48px); max-width:1132px; margin:0 auto;
    background:var(--bg-panel-2); border:1px solid var(--gold-dim); border-radius:8px;
    padding:18px 22px; display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap;
    box-shadow:0 20px 40px -20px rgba(0,0,0,0.6);
  }
  /* spacer so the fixed order-bar never covers the content below it */
  #topup{padding-bottom:130px;}
  .order-bar .info{font-size:14px; color:var(--text-dim);}
  .order-bar .info b{color:var(--text); font-family:'Rajdhani'; font-size:19px; font-weight:700; display:block;}
  .order-bar button{
    background:var(--gold); color:#0A0E1A; border:none; font-weight:700; padding:14px 26px; border-radius:4px;
    font-size:14.5px; cursor:pointer; letter-spacing:0.02em; font-family:inherit;
  }
  .order-bar button:disabled{background:var(--line); color:var(--text-dim); cursor:not-allowed;}

  /* ---------- TRUST ---------- */
  .trust{display:grid; grid-template-columns:repeat(3,1fr); gap:20px;}
  @media (max-width:760px){ .trust{grid-template-columns:1fr;} }
  .trust div{border-top:1px solid var(--line); padding-top:18px;}
  .trust h3{font-size:17px; font-weight:600; text-transform:none;}
  .trust p{font-size:14px; color:var(--text-dim); margin-top:8px; line-height:1.6;}

  footer{border-top:1px solid var(--line); padding:40px 0; margin-top:40px;}
  footer .wrap{display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:14px;}
  footer p{font-size:13px; color:var(--text-dim);}

  #toast{
    position:fixed; left:50%; bottom:24px; transform:translate(-50%, 20px); background:#101627; border:1px solid var(--gold);
    color:var(--text); padding:14px 22px; border-radius:6px; font-size:14px; opacity:0; pointer-events:none;
    transition:opacity .25s ease, transform .25s ease; z-index:100; max-width:90vw; text-align:center;
  }
  #toast.show{opacity:1; transform:translate(-50%, 0);}

  /* ---------- PAYMENT VIEW ---------- */
  .pay-wrap{ min-height:100vh; display:flex; align-items:flex-start; justify-content:center; padding:40px 16px; }
  .pay-card{ width:100%; max-width:460px; background:var(--bg-panel); border:1px solid var(--line); border-radius:10px; overflow:hidden; margin:0 auto; }
  .pay-head{ padding:22px 26px; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; }
  .back-link{ display:flex; align-items:center; gap:6px; font-size:13px; color:var(--text-dim); cursor:pointer; background:none; border:none; font-family:inherit; }
  .back-link:hover{ color:var(--cyan); }
  .pay-timer{ font-family:'Rajdhani'; font-weight:700; font-size:14px; color:var(--gold); border:1px solid var(--gold-dim); padding:5px 11px; border-radius:999px; background:rgba(227,179,65,0.08); }
  .pay-timer.expired{color:var(--danger); border-color:var(--danger);}
  .pay-summary{padding:20px 26px; border-bottom:1px dashed var(--line);}
  .pay-row{display:flex; justify-content:space-between; font-size:13.5px; color:var(--text-dim); margin-bottom:8px;}
  .pay-row b{color:var(--text); font-weight:600;}
  .pay-row.total{margin-top:12px; padding-top:12px; border-top:1px solid var(--line);}
  .pay-row.total span{font-size:14px; color:var(--text);}
  .pay-row.total b{font-family:'Rajdhani'; font-size:22px; color:var(--gold);}
  .qr-zone{padding:26px; text-align:center;}
  .qr-frame{ background:#fff; border-radius:10px; padding:14px; display:inline-block; box-shadow:0 0 0 1px var(--gold-dim), 0 20px 40px -20px rgba(227,179,65,0.35); }
  .qr-frame img{display:block; width:240px; height:240px; object-fit:contain; border-radius:4px;}
  .qr-caption{margin-top:14px; font-size:12.5px; color:var(--text-dim);}
  .dana-only-alert{ margin:18px 26px 0; background:rgba(79,217,232,0.08); border:1px solid rgba(79,217,232,0.4); border-radius:6px; padding:14px 16px; font-size:13px; color:var(--text-dim); line-height:1.55; }
  .dana-only-alert b{color:var(--cyan); display:block; font-size:15px; margin-bottom:4px; font-family:'Rajdhani'; letter-spacing:0.02em;}
  .nominal-alert{ margin:18px 26px 0; background:rgba(227,179,65,0.08); border:1px solid var(--gold-dim); border-radius:6px; padding:14px 16px; font-size:13px; color:var(--text-dim); line-height:1.55; }
  .nominal-alert b{color:var(--gold); display:block; font-size:15px; margin-bo
